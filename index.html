<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>VoiceNote Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>VoiceNote Pro</h1>
            <button id="themeBtn" class="icon-btn">🌙</button>
        </header>

        <!-- 新規作成 -->
        <main id="createView" class="view active">
            <div class="how-to">
                <details>
                    <summary>使い方</summary>
                    <ol>
                        <li><strong>iPhoneで通話録音</strong> → メモアプリに自動保存</li>
                        <li>メモを開く → 文字起こしテキストを<strong>全選択してコピー</strong></li>
                        <li>下の入力欄に<strong>貼り付け</strong> → 「要約を作成」</li>
                    </ol>
                </details>
            </div>

            <div class="card">
                <div class="category-select">
                    <button class="cat-btn active" data-cat="phone">📞 電話</button>
                    <button class="cat-btn" data-cat="meeting">🏢 会議</button>
                    <button class="cat-btn" data-cat="medical">🏥 診察</button>
                </div>

                <input type="text" id="titleInput" class="input" placeholder="タイトル（空欄なら自動生成）">

                <div class="textarea-wrap">
                    <textarea id="textInput" class="textarea" rows="10" placeholder="メモアプリからコピーした文字起こしテキストをここに貼り付けてください..."></textarea>
                    <button id="pasteBtn" class="paste-btn">📋 貼り付け</button>
                </div>

                <div id="charCount" class="char-count">0 文字</div>

                <button id="summarizeBtn" class="primary-btn" disabled>要約を作成</button>
            </div>

            <div id="resultCard" class="card result-card" style="display:none">
                <h3 id="resultTitle"></h3>
                <div id="resultSummary" class="summary-content"></div>
                <div class="result-actions">
                    <button id="copyResultBtn" class="action-btn">📋 コピー</button>
                    <button id="saveResultBtn" class="primary-btn">保存</button>
                </div>
            </div>
        </main>

        <!-- 履歴 -->
        <main id="historyView" class="view">
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">全て</button>
                <button class="filter-btn" data-filter="phone">📞</button>
                <button class="filter-btn" data-filter="meeting">🏢</button>
                <button class="filter-btn" data-filter="medical">🏥</button>
            </div>
            <input type="search" id="searchInput" class="input" placeholder="検索...">
            <div id="historyList"></div>
            <div class="stats" id="stats"></div>
        </main>

        <!-- 設定 -->
        <main id="settingsView" class="view">
            <div class="card">
                <h3>Google Drive 同期</h3>
                <p class="desc">要約をGoogleドライブに自動保存</p>
                <div id="gdriveStatus" class="status"><span class="dot off"></span>未接続</div>
                <input type="url" id="gdriveUrl" class="input" placeholder="GAS デプロイURL">
                <div class="row-btns">
                    <button id="gdriveTestBtn" class="action-btn">テスト</button>
                    <button id="gdriveSaveBtn" class="primary-btn">保存</button>
                </div>
            </div>
            <div class="card">
                <h3>アプリ情報</h3>
                <p class="desc">VoiceNote Pro v2.0</p>
                <p class="desc">iPhoneの通話録音 + メモの文字起こしを活用した要約アプリ</p>
            </div>
        </main>

        <!-- 詳細モーダル -->
        <div id="modal" class="modal" style="display:none">
            <div class="modal-sheet">
                <div class="modal-header">
                    <h2 id="modalTitle"></h2>
                    <button id="modalClose" class="icon-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="modal-tabs">
                        <button class="mtab active" data-t="sum">要約</button>
                        <button class="mtab" data-t="full">全文</button>
                    </div>
                    <div id="tabSum" class="mtab-content active">
                        <div id="modalSummary" class="summary-content"></div>
                    </div>
                    <div id="tabFull" class="mtab-content">
                        <div id="modalFull" class="full-text"></div>
                    </div>
                    <div class="modal-actions">
                        <button id="modalCopy" class="action-btn">📋 コピー</button>
                        <button id="modalDelete" class="action-btn danger">🗑 削除</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="toast" class="toast"></div>

        <nav>
            <button class="nav-btn active" data-view="createView">
                <span>✏️</span><span>作成</span>
            </button>
            <button class="nav-btn" data-view="historyView">
                <span>📋</span><span>履歴</span>
            </button>
            <button class="nav-btn" data-view="settingsView">
                <span>⚙️</span><span>設定</span>
            </button>
        </nav>
    </div>

    <script src="app.js"></script>
</body>
</html>
